<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preços | FG Sites</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    color:#00ff88;
    padding:40px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#222;
    padding:20px;
    width:250px;
    border-radius:10px;
}

.price{
    color:#00ff88;
    font-size:26px;
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#00ff88;
    color:black;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>Planos FG Sites</h1>

<div class="container">

    <div class="card">
        <h2>Básico</h2>
        <div class="price">R$ 50</div>
        <p>1 página simples</p>
    </div>

    <div class="card">
        <h2>Profissional</h2>
        <div class="price">R$ 120</div>
        <p>Até 3 páginas + WhatsApp</p>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <div class="price">R$ 250</div>
        <p>Site completo + animações</p>
    </div>

</div>

<br>

<a class="btn" href="index.html">Voltar ao site</a>

</body>
</html>
